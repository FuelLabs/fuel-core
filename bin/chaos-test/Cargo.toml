[package]
name = "fuel-core-chaos-test"
edition = { workspace = true }
version = { workspace = true }
publish = false

[[bin]]
name = "chaos-test"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
fuel-core = { workspace = true, features = ["p2p", "test-helpers", "rocksdb"] }
fuel-core-chain-config = { workspace = true }
fuel-core-poa = { workspace = true }
fuel-core-storage = { workspace = true }
fuel-core-types = { workspace = true, features = ["test-helpers"] }
futures = { workspace = true }
humantime = "2.1"
tempfile = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "time", "signal"] }
tokio-stream = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["ansi", "env-filter"] }
